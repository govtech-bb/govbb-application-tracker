databases:
  - name: govbb-tracker-db
    plan: starter             # ~$7/mo: 1 GB, managed Postgres
    databaseName: govbb_tracker
    user: govbb

services:
  - type: web
    name: govbb-tracker
    runtime: docker
    plan: starter
    region: oregon
    branch: main
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3030
      - key: DATABASE_URL
        fromDatabase:
          name: govbb-tracker-db
          property: connectionString
      - key: TRACKER_DATA_DIR
        value: /var/data
      - key: MAIL_OUT_DIR
        value: /var/data/mail-out
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: SESSION_SECRET
        generateValue: true
      - key: TRACKER_BASE_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: INCOMING_API_KEY
        sync: false
      - key: OFFICER_PASSWORD_ANDREA
        sync: false
      - key: OFFICER_PASSWORD_TREVOR
        sync: false
      - key: OFFICER_PASSWORD_JOY
        sync: false
      - key: PASSWORD_TOKEN_TTL_HOURS
        value: 24
    disk:
      name: tracker-data
      mountPath: /var/data
      sizeGB: 1               # for email audit trail + citizen uploads only (DB is Postgres)
