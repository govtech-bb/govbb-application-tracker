<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — GovBB Caseload</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  body { font-family: Inter, -apple-system, system-ui, sans-serif; background: #0f172a; color: #f8fafc; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .card { background: #fff; color: #0f172a; width: 100%; max-width: 380px; border-radius: 10px; padding: 28px 26px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.4); }
  .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; font-weight: 700; font-size: 16px; letter-spacing: -0.01em; }
  .brand-mark { width: 32px; height: 32px; background: #ffc726; color: #000; border-radius: 6px; display: grid; place-items: center; font-weight: 800; font-size: 14px; }
  h1 { margin: 0 0 6px; font-size: 22px; font-weight: 700; letter-spacing: -0.01em; }
  .sub { color: #475569; font-size: 14px; margin-bottom: 22px; }
  label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; }
  input { width: 100%; box-sizing: border-box; border: 1px solid #cbd5e1; padding: 9px 11px; border-radius: 6px; font: inherit; font-size: 14px; }
  input:focus { outline: 2px solid #00267f; border-color: #00267f; }
  .field { margin-bottom: 14px; }
  .err { background: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; padding: 9px 12px; border-radius: 6px; font-size: 13px; margin-bottom: 14px; display: none; }
  .err.is-on { display: block; }
  button { width: 100%; background: #00267f; color: #fff; border: 0; padding: 11px; font: inherit; font-weight: 600; border-radius: 6px; cursor: pointer; font-size: 14px; }
  button:hover { background: #001b5c; }
  button:focus-visible { outline: 3px solid #ffc726; outline-offset: 2px; }
  .hint { color: #64748b; font-size: 12.5px; margin-top: 18px; padding-top: 16px; border-top: 1px solid #e2e8f0; }
  .hint code { background: #f1f5f9; padding: 1px 5px; border-radius: 4px; font-size: 12px; }
</style>
</head>
<body>
<form class="card" id="login-form" novalidate>
  <div class="brand">
    <span class="brand-mark">BB</span>
    <span>GovBB Caseload</span>
  </div>
  <h1>Sign in</h1>
  <p class="sub">Officer access to the application caseload.</p>

  <div class="err" id="err"></div>

  <div class="field">
    <label for="email">Email address</label>
    <input id="email" name="email" type="email" autocomplete="username" required autofocus>
  </div>
  <div class="field">
    <label for="password">Password</label>
    <input id="password" name="password" type="password" autocomplete="current-password" required>
  </div>
  <button type="submit">Sign in</button>

  <div class="hint">
    Forgot your password? Ask an admin to send you a reset link from the Users tab.
  </div>
</form>

<script>
const form = document.getElementById('login-form');
const err = document.getElementById('err');
const params = new URLSearchParams(location.search);
const next = params.get('next') || '/officer';

async function getCsrfToken() {
  const r = await fetch('/api/csrf-token');
  return (await r.json()).token;
}

form.addEventListener('submit', async e => {
  e.preventDefault();
  err.classList.remove('is-on');
  const email = document.getElementById('email').value.trim().toLowerCase();
  const password = document.getElementById('password').value;
  const csrf = await getCsrfToken();
  const r = await fetch('/api/officer/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-csrf-token': csrf },
    body: JSON.stringify({ username: email, password })
  });
  if (r.ok) {
    location.href = next;
  } else {
    const data = await r.json().catch(() => ({}));
    err.textContent = data.error || 'Sign-in failed.';
    err.classList.add('is-on');
  }
});
</script>
</body>
</html>
